<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SupplyChainOS - Login</title>
    <meta name="description" content="Smart Supply Chain Disruption & Vendor Risk Management System - Enterprise Login"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,1&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0B1120; --surface: #111B2E; --surface2: #1A2540;
            --primary: #06B6D4; --primary-glow: rgba(6,182,212,0.4);
            --success: #10B981; --error: #F43F5E; --warning: #F59E0B;
            --text: #E2E8F0; --text-muted: #8892A4; --border: rgba(255,255,255,0.08);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
               min-height: 100vh; display: flex; align-items: center; justify-content: center;
               overflow: hidden; }
        .bg-orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
        .bg-orb-1 { width: 400px; height: 400px; background: rgba(6,182,212,0.12); top: -100px; right: -100px; }
        .bg-orb-2 { width: 300px; height: 300px; background: rgba(16,185,129,0.08); bottom: -50px; left: -80px; }
        .login-card {
            position: relative; z-index: 1; width: 100%; max-width: 440px; margin: 1rem;
            background: rgba(17,27,46,0.85); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(6,182,212,0.1);
        }
        .brand { text-align: center; margin-bottom: 2rem; }
        .brand-icon { width: 56px; height: 56px; background: linear-gradient(135deg, var(--primary), #0891B2);
                      border-radius: 16px; display: flex; align-items: center; justify-content: center;
                      margin: 0 auto 1rem; box-shadow: 0 0 20px var(--primary-glow); }
        .brand-icon .material-symbols-outlined { font-size: 28px; color: #000; }
        .brand h1 { font-size: 1.75rem; font-weight: 800; letter-spacing: -0.5px; }
        .brand p { color: var(--text-muted); font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; }
        .field { margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase; }
        input[type=email], input[type=password] {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px 16px; color: var(--text); font-size: 0.95rem;
            font-family: inherit; transition: all 0.2s; outline: none;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(6,182,212,0.15); background: rgba(6,182,212,0.05); }
        .btn-login {
            width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), #0891B2);
            color: #000; font-weight: 700; font-size: 0.95rem; border: none; border-radius: 10px;
            cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px;
            margin-top: 0.5rem;
        }
        .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 25px var(--primary-glow); }
        .btn-login:active { transform: translateY(0); }
        .error-msg { background: rgba(244,63,94,0.12); border: 1px solid rgba(244,63,94,0.3);
                     color: #F43F5E; border-radius: 8px; padding: 10px 14px; font-size: 0.85rem;
                     margin-bottom: 1rem; display: none; }
        .hint { text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
        .hint p { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 6px; }
        .hint code { background: rgba(255,255,255,0.06); padding: 2px 8px; border-radius: 4px;
                     font-size: 0.7rem; color: var(--primary); }
    </style>
</head>
<body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="login-card">
        <div class="brand">
            <div class="brand-icon"><span class="material-symbols-outlined">hub</span></div>
            <h1>SupplyChainOS</h1>
            <p>Enterprise Authentication</p>
        </div>

        <div id="errorMsg" class="error-msg"></div>

        <form id="loginForm">
            <div class="field">
                <label for="email">Work Email</label>
                <input type="email" id="email" placeholder="admin@scm.com" required/>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required/>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">
                <span class="material-symbols-outlined" style="font-size:18px">login</span>
                Sign In
            </button>
        </form>

        <div class="hint">
            <p>Demo credentials:</p>
            <p><code>admin@scm.com / admin123</code> &nbsp;|&nbsp; <code>pm@scm.com / pm123</code></p>
            <p><code>analyst@scm.com / analyst123</code> &nbsp;|&nbsp; <code>wm@scm.com / wm123</code></p>
        </div>
    </div>

    <script>
        // Redirect if already logged in
        if (localStorage.getItem('token')) window.location.href = '/dashboard.html';

        const API_BASE = 'http://localhost:8080/api';
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errDiv = document.getElementById('errorMsg');
            btn.textContent = 'Signing in...';
            btn.disabled = true;
            errDiv.style.display = 'none';

            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (res.ok && data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data));
                    window.location.href = '/dashboard.html';
                } else {
                    errDiv.textContent = data.error || 'Login failed. Check credentials.';
                    errDiv.style.display = 'block';
                }
            } catch (err) {
                errDiv.textContent = 'Network error. Make sure the Java backend is running on port 8080.';
                errDiv.style.display = 'block';
            } finally {
                btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:18px">login</span> Sign In';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
